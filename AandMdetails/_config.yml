title: A&M Detailing
description: Premium Auto Detailing Services
url: "https://aandmdetail.netlify.app"

# Output settings
destination: _site
source: .

# Exclude from processing
exclude:
  - node_modules
  - "*.log"
  - README.md
  - package.json
  - package-lock.json
  - .git
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - netlify.toml

# Include files that might be excluded by default
include:
  - .nojekyll
  - _redirects

# Markdown processing
markdown: kramdown
kramdown:
  input: GFM

# Keep files
keep_files:
  - assets
