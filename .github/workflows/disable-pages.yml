# This workflow prevents GitHub Pages deployment conflicts
# Since we're using Netlify for deployment, we don't need GitHub Pages

name: Disable GitHub Pages

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]

jobs:
  disable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Skip Pages deployment
        run: echo "GitHub Pages deployment skipped - using Netlify instead"
